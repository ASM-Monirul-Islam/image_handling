{% extends "base.html" %} {% block content %}

<div class="image_list_title">
  <h1>Your Images</h1>
  <button><a href="{% url 'create_image' %}">Add Image</a></button>
</div>
<div class="image_list">
  {% for img in images %}
  <div class="image_card">
    <div class="image_title">{{img.name}}</div>
    <div class="image">
      <img src="{{img.img_file.url}}" width=200/>
    </div>
  </div>
  {% empty %} Images not added yet {% endfor %}
</div>
{% endblock content %}
